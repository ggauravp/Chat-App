<h2>Signup</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username"><br>
    <input type="password" name="password" placeholder="Password"><br>
    <button type="submit">Signup</button>
</form>

<p style="color:red">{{ error }}</p>

<a href="/accounts/login/">Login</a>
