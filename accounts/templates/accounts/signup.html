<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #25D366, #128C7E);
            font-family: Arial, sans-serif;
        }

        .card {
            width: 350px;
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #128C7E;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #25D366;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #25D366;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #20bd5a;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        a {
            color: #128C7E;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>Create Account</h2>

    <form method="POST">
        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Sign Up
        </button>
    </form>

    <p class="error">{{ error }}</p>

    <div class="link">
        Already have an account?
        <a href="/accounts/login/">Login</a>
    </div>

</div>

</body>
</html>
