<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Echo Chat</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, system-ui, sans-serif;
            color: #111827;
            background: #eff2ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #eef2ff 0%, #c7d2fe 100%);
        }

        .container {
            width: min(100%, 420px);
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
            border: 1px solid rgba(99, 102, 241, 0.12);
        }

        .brand {
            font-size: 1.75rem;
            font-weight: 700;
            color: #4338ca;
            margin: 0 0 8px;
        }

        .subtitle {
            color: #4b5563;
            margin: 0 0 32px;
            line-height: 1.6;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid #dbeafe;
            margin-bottom: 16px;
            font-size: 0.95rem;
            color: #111827;
            background: #f8fafc;
        }

        input:focus {
            outline: 2px solid #c7d2fe;
            border-color: #c7d2fe;
            background: white;
        }

        button {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 16px;
            background: #4338ca;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #312e81;
        }

        .error {
            color: #dc2626;
            text-align: center;
            margin: 12px 0 0;
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            color: #6b7280;
            font-size: 0.95rem;
        }

        .footer a {
            color: #4338ca;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="container">
        <h1 class="brand">Echo Chat</h1>
        <p class="subtitle">Sign in to continue chatting with your friends and discover new connections.</p>

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit">Sign In</button>
        </form>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <p class="footer">
            Don’t have an account? <a href="/accounts/signup/">Create one</a>
        </p>
    </main>
</body>
</html>
