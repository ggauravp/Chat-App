<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #e5ddd5;
        }

        .chat-container {
            max-width: 700px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #efeae2;
        }

        /* HEADER */
        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px;
            font-size: 18px;
        }

        /* MESSAGES BOX */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        /* COMMON MESSAGE */
        .msg {
            max-width: 60%;
            padding: 10px 12px;
            margin: 5px 0;
            border-radius: 10px;
            font-size: 14px;
            position: relative;
            word-wrap: break-word;
        }

        /* SENT (RIGHT SIDE) */
        .sent {
            background: #dcf8c6;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        /* RECEIVED (LEFT SIDE) */
        .received {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        /* TIME */
        .time {
            font-size: 10px;
            color: gray;
            margin-top: 5px;
            text-align: right;
        }

        /* INPUT BOX */
        .input-box {
            display: flex;
            padding: 10px;
            background: #f0f0f0;
        }

        #messageInput {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            background: #075e54;
            color: white;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        Chat Room {{ conversation_id }}
    </div>

    <div id="messages"></div>

    <div class="input-box">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
    // Get conversation id passed from Django template
    const conversationId = "{{ conversation_id }}";

    // Logged-in user's id
    const userId = "{{ request.user.id }}";

    // Logged-in user's username
    const userName = "{{ request.user.username }}";

    // Message container where all chat messages will be displayed
    const messagesContainer = document.getElementById("messages");

    // Create a WebSocket connection request to Django Channels.
    // This request is matched against websocket_urlpatterns and routed to ChatConsumer.
    const socket = new WebSocket(
        "ws://" + window.location.host + "/ws/chat/" + conversationId + "/"
    );

    // Runs whenever a new message is received from the Consumer
    socket.onmessage = function (event) {

        // Convert JSON string received from backend into JS object
        const data = JSON.parse(event.data);

        // Add the received message to the chat UI
        appendMessage(
            data.sender_id,
            data.sender_username,
            data.message,
            data.timestamp || getTime()
        );
    };

    // Called when Send button is clicked
    function sendMessage() {

        // Get input field
        const input = document.getElementById("messageInput");

        // Prevent sending empty messages
        if (!input.value.trim()) return;

        // Send message through WebSocket to Django Consumer
        socket.send(JSON.stringify({
            message: input.value
        }));

        // Clear input field after sending
        input.value = "";
    }

    // Runs when WebSocket connection closes
    socket.onclose = () => console.log("WebSocket closed");

    // Load old messages that Django sent while rendering page
    const oldMessages = JSON.parse(`{{ messages_json|escapejs }}`);

    // Display all previous messages in chat box
    oldMessages.forEach(msg => {
        appendMessage(
            msg.sender_id,
            msg.sender_username,
            msg.message,
            msg.timestamp
        );
    });

    // Creates a message bubble and adds it to chat UI
    function appendMessage(senderId, senderName, message, time) {

        // Create new div element for message
        const div = document.createElement("div");

        // Check whether this message belongs to current user
        const isMe = parseInt(senderId) === parseInt(userId);

        // Add common message class
        div.classList.add("msg");

        // Add sent/received class based on sender
        div.classList.add(isMe ? "sent" : "received");

        // Create message bubble HTML
        div.innerHTML = `
            <div><b>${isMe ? "You" : senderName}</b></div>
            <div>${message}</div>
            <div class="time">${time}</div>
        `;

        // Add message to chat container
        messagesContainer.appendChild(div);

        // Automatically scroll to latest message
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Generate current time for live messages
    // Used as fallback if timestamp isn't sent from backend
    function getTime() {
        const now = new Date();

        return now.getHours() + ":" +
               String(now.getMinutes()).padStart(2, "0");
    }
</script>
</body>
</html>
