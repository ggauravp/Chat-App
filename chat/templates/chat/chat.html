{% load static %}
<head>
    <link rel="stylesheet" href="{% static 'chat/css/chat.css' %}">
</head>
<div class="chat-container">

    <div class="chat-header">
        <div>
            <div class="title">Echo Chat</div>
            <div class="subtitle">Logged in as {{ request.user.username }}</div>
            <div class="subtitle">Conversation #{{ conversation_id }}</div>
        </div>

        <div class="subtitle">
            Live chat with your friends
        </div>

        <div class="call-buttons">
            <button class="call-btn" onclick="startAudioCall()">📞</button>
            <button class="call-btn" onclick="startVideoCall()">🎥</button>
        </div>
    </div>
<!-- Call Screen. This is where the call interface will be displayed . it is hidden when page first loads and shown when a call is intiated-->
    <div id="callScreen" class="call-screen hidden">

        <!-- Local camera -->
        <video
            id="localVideo"
            autoplay
            playsinline
            muted>
        </video>

        <!-- Remote user's camera -->
        <video
            id="remoteVideo"
            autoplay
            playsinline>
        </video>

        <div class="call-controls">

            <button onclick="endCall()">
                End Call
            </button>

        </div>

    </div>

    <div id="messages"></div>

    <div class="input-box">
        <input
            type="text"
            id="messageInput"
            placeholder="Type a message..."
        >

        <button onclick="sendMessage()">
            Send
        </button>
    </div>

</div><!-- Call Modal -->
<div id="callModal" class="call-modal hidden">

    <div class="call-card">

        <div class="call-icon">📞</div>

        <h2 id="callTitle">Incoming Call</h2>

        <p id="callText">Someone is calling...</p>

        <div class="call-actions">

            <button
                id="acceptBtn"
                class="accept-btn">
                Accept
            </button>

            <button
                id="declineBtn"
                class="decline-btn">
                Decline
            </button>

        </div>

    </div>

</div>


<div
    id="chat-data"
    data-conversation-id="{{ conversation_id }}"
    data-user-id="{{ request.user.id }}"
    data-username="{{ request.user.username }}"
></div>

<script id="messages-data" type="application/json">
{{ messages_json|safe }}
</script>

<script src="{% static 'chat/js/chat.js' %}"></script>
