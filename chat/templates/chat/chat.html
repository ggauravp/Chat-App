<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #e5ddd5;
        }

        .chat-container {
            max-width: 700px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #efeae2;
        }

        /* HEADER */
        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px;
            font-size: 18px;
        }

        /* MESSAGES BOX */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        /* COMMON MESSAGE */
        .msg {
            max-width: 60%;
            padding: 10px 12px;
            margin: 5px 0;
            border-radius: 10px;
            font-size: 14px;
            position: relative;
            word-wrap: break-word;
        }

        /* SENT (RIGHT SIDE) */
        .sent {
            background: #dcf8c6;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        /* RECEIVED (LEFT SIDE) */
        .received {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        /* TIME */
        .time {
            font-size: 10px;
            color: gray;
            margin-top: 5px;
            text-align: right;
        }

        /* INPUT BOX */
        .input-box {
            display: flex;
            padding: 10px;
            background: #f0f0f0;
        }

        #messageInput {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            background: #075e54;
            color: white;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        Chat Room {{ conversation_id }}
    </div>

    <div id="messages"></div>

    <div class="input-box">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
    const conversationId = "{{ conversation_id }}";
    const userId = "{{ request.user.id }}";
    const userName = "{{ request.user.username }}";

    const messagesContainer = document.getElementById("messages");

    const socket = new WebSocket(
        "ws://" + window.location.host + "/ws/chat/" + conversationId + "/"
    );

    socket.onmessage = function (event) {
        const data = JSON.parse(event.data);

        appendMessage(
            data.sender_id,
            data.sender_username,
            data.message,
            data.timestamp || getTime()
        );
    };

    function sendMessage() {
        const input = document.getElementById("messageInput");

        if (!input.value.trim()) return;

        socket.send(JSON.stringify({
            message: input.value
        }));

        input.value = "";
    }

    socket.onclose = () => console.log("WebSocket closed");

    // OLD MESSAGES
    const oldMessages = JSON.parse(`{{ messages_json|escapejs }}`);

    oldMessages.forEach(msg => {
        appendMessage(
            msg.sender_id,
            msg.sender_username,
            msg.message,
            msg.timestamp
        );
    });

    function appendMessage(senderId, senderName, message, time) {
        const div = document.createElement("div");

        const isMe = parseInt(senderId) === parseInt(userId);

        div.classList.add("msg");
        div.classList.add(isMe ? "sent" : "received");

        div.innerHTML = `
            <div><b>${isMe ? "You" : senderName}</b></div>
            <div>${message}</div>
            <div class="time">${time}</div>
        `;

        messagesContainer.appendChild(div);

        // AUTO SCROLL
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function getTime() {
        const now = new Date();
        return now.getHours() + ":" + String(now.getMinutes()).padStart(2, "0");
    }
</script>

</body>
</html>
